version: '3.8'

# Development overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development

  user-service:
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  review-service:
    volumes:
      - ./services/review-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  user-library-service:
    volumes:
      - ./services/user-library-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  book-service:
    volumes:
      - ./services/book-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
      USER_SERVICE_URL: http://user-service:3001
    command: npm run dev

  forum-service:
    volumes:
      - ./services/forum-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  chat-service:
    volumes:
      - ./services/chat-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  admin-service:
    volumes:
      - ./services/admin-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  analytics-service:
    volumes:
      - ./services/analytics-service:/app
      - /app/node_modules
      - /app/dist
    environment:
      NODE_ENV: development
    command: npm run dev

  chatbot-service:
    volumes:
      - ./services/chatbot-service:/app
    environment:
      NODE_ENV: development
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
