name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            path: ./frontend
            type: node
          - name: user-service
            path: ./services/user-service
            type: node
          - name: user-library-service
            path: ./services/user-library-service
            type: node
          - name: review-service
            path: ./services/review-service
            type: node
          - name: book-service
            path: ./services/book-service
            type: node
          - name: group-service
            path: ./services/group-service
            type: node
          - name: chat-service
            path: ./services/chat-service
            type: node
          - name: admin-service
            path: ./services/admin-service
            type: node

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: TypeScript type check
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json found, skipping typecheck"
          fi
        continue-on-error: true

      - name: Run ESLint
        working-directory: ${{ matrix.service.path }}
        run: |
          if npm run lint 2>/dev/null; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            path: ./frontend
          - name: user-service
            path: ./services/user-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Run Prisma Generate (if applicable)
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ -d "prisma" ] && [ -f "package.json" ] && grep -q "prisma" package.json; then
            npx prisma generate
          fi
        continue-on-error: true

      - name: Run tests
        working-directory: ${{ matrix.service.path }}
        run: |
          if npm run test 2>/dev/null; then
            npm run test
          else
            echo "No test script found, skipping tests"
          fi
        continue-on-error: true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    strategy:
      matrix:
        service:
          - name: frontend
            path: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: user-service
            path: ./services/user-service
            dockerfile: ./services/user-service/Dockerfile
          - name: user-library-service
            path: ./services/user-library-service
            dockerfile: ./services/user-library-service/Dockerfile
          - name: review-service
            path: ./services/review-service
            dockerfile: ./services/review-service/Dockerfile
          - name: book-service
            path: ./services/book-service
            dockerfile: ./services/book-service/Dockerfile
          - name: group-service
            path: ./services/group-service
            dockerfile: ./services/group-service/Dockerfile
          - name: chat-service
            path: ./services/chat-service
            dockerfile: ./services/chat-service/Dockerfile
          - name: admin-service
            path: ./services/admin-service
            dockerfile: ./services/admin-service/Dockerfile
          - name: chatbot-service
            path: ./services/chatbot-service
            dockerfile: ./services/chatbot-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: shelfspace-${{ matrix.service.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-images:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    needs: [build-images]
    strategy:
      matrix:
        service:
          - frontend
          - user-service
          - user-library-service
          - review-service
          - book-service
          - group-service
          - chat-service
          - admin-service
          - chatbot-service

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shelfspace-${{ matrix.service }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

