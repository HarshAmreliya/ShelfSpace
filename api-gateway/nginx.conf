events {}

http{
  limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

  upstream frontend_server{
    server frontend:3000;
  }
  upstream user_service_server {
    server user-service:3001;
  }
  upstream review_service_server {
    server review-service:3002;
  }
  upstream forum_service_server {
    server forum-service:3005;
  }
  upstream chat_service_server {
    server chat-service:3006;
  }
  upstream admin_service_server {
    server admin-service:3007;
  }
  upstream analytics_service_server {
    server analytics-service:3008;
  }
  upstream user_library_service_server {
    server user-library-service:3003;
  }
  upstream book_service_server {
    server book-service:3004;
  }
  upstream chatbot_service_server {
    server chatbot-service:8000;
  }
  server{
    listen 80;

    location / {
      proxy_pass http://frontend_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://user_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reviews/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://review_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/forums/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://forum_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/chat/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://chat_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket proxy
    location /socket.io/ {
      proxy_pass http://chat_service_server;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400;
    }

    location /api/admin/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://admin_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/user-chat/ {
      limit_req zone=per_ip burst=20 nodelay;
      rewrite ^/api/user-chat/(.*) /api/chat/$1 break;
      proxy_pass http://user_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/library/ {
      limit_req zone=per_ip burst=20 nodelay;
      rewrite ^/api/library/(.*) /$1 break;
      proxy_pass http://user_library_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/books/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://book_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/analytics/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://analytics_service_server;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/chatbot/ {
      limit_req zone=per_ip burst=20 nodelay;
      proxy_pass http://chatbot_service_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }

    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}
