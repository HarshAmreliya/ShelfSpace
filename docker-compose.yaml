services:
  nginx-gateway:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - shelfspace-net
    depends_on:
      - frontend
      - user-service
      # - user-library-service
      # - book-service
  frontend:
    build: ./frontend
    networks:
      - shelfspace-net

  user-service:
    build: ./services/user-service
    networks:
      - shelfspace-net

  # user-library-service:
  #   build: ./services/user-library-service
  #   networks:
  #     - shelfspace-net

  # book-service:
  #   build: ./services/book-service
  #   networks:
  #     - shelfspace-net

networks:
  shelfspace-net:
    driver: bridge
