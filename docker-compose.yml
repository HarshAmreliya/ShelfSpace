version: '3.8'

services:
  # ============================================
  # DATABASES
  # ============================================
  
  postgres:
    image: postgres:16-alpine
    container_name: shelfspace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER environment variable is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
      POSTGRES_DB: ${POSTGRES_DB:-shelfspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/user-service/prisma:/docker-entrypoint-initdb.d/user-service
      - ./services/review-service/prisma:/docker-entrypoint-initdb.d/review-service
      - ./services/group-service/prisma:/docker-entrypoint-initdb.d/group-service
      - ./services/chat-service/prisma:/docker-entrypoint-initdb.d/chat-service
      - ./services/admin-service/prisma:/docker-entrypoint-initdb.d/admin-service
    ports:
      - "5432:5432"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  mongodb:
    image: mongo:7-jammy
    container_name: shelfspace-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER environment variable is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD environment variable is required}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-books}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  redis:
    image: redis:7-alpine
    container_name: shelfspace-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

  # ============================================
  # API GATEWAY
  # ============================================

  nginx-gateway:
    image: nginx:stable-alpine
    container_name: shelfspace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./api-gateway/ssl:/etc/nginx/ssl:ro
    networks:
      - shelfspace-net
    depends_on:
      frontend:
        condition: service_healthy
      user-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      user-library-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shelfspace-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID environment variable is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET environment variable is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET environment variable is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # BACKEND SERVICES
  # ============================================

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: shelfspace-user-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      LIBRARY_SERVICE_URL: http://user-library-service:3003
      REDIS_URL: redis://redis:6379
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    container_name: shelfspace-review-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  user-library-service:
    build:
      context: ./services/user-library-service
      dockerfile: Dockerfile
    container_name: shelfspace-library-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      BOOK_SERVICE_URL: http://book-service:3004
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  book-service:
    build:
      context: ./services/book-service
      dockerfile: Dockerfile
    container_name: shelfspace-book-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-books}?authSource=admin
    networks:
      - shelfspace-net
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  group-service:
    build:
      context: ./services/group-service
      dockerfile: Dockerfile
    container_name: shelfspace-group-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: shelfspace-chat-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
      GROUP_SERVICE_URL: http://group-service:3005
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      group-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    container_name: shelfspace-admin-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shelfspace}
      USER_SERVICE_URL: http://user-service:3001
    networks:
      - shelfspace-net
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  chatbot-service:
    build:
      context: ./services/chatbot-service
      dockerfile: Dockerfile
    container_name: shelfspace-chatbot-service
    environment:
      PORT: 8000
      PINECONE_API_KEY: ${PINECONE_API_KEY:?PINECONE_API_KEY environment variable is required}
      PINECONE_ENV: ${PINECONE_ENV:?PINECONE_ENV environment variable is required}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-shelfspace-books}
    networks:
      - shelfspace-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - dev
      - prod
    restart: unless-stopped

  # ============================================
  # VOLUMES
  # ============================================

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local

  # ============================================
  # NETWORKS
  # ============================================

networks:
  shelfspace-net:
    driver: bridge

